<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="100%" height="100%">
  <defs>
    <!-- Gradiente verde neón a cian para el logo de la navbar móvil -->
    <linearGradient id="navGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff14" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
  </defs>

  <!-- Transparent background for navbar integration (no rect background, purely transparent) -->

  <!-- Left Circular Badge (analogous to the [FA] badge in the mockup) -->
  <g transform="translate(40, 40)">
    <!-- Outer green/cyan gradient circle -->
    <circle cx="0" cy="0" r="30" fill="url(#navGradient)"/>
    
    <!-- Inner dark circle to create a clean hollow ring effect or just keep it solid? -->
    <!-- Let's do a solid white icon overlay representing the balance scale and ball -->
    <!-- Scale Beam -->
    <path d="M -15,-5 L 15,-5" fill="none" stroke="#121212" stroke-width="4" stroke-linecap="round"/>
    <!-- Center stand -->
    <path d="M -6,15 L 6,15 M 0,15 L 0,-10" fill="none" stroke="#121212" stroke-width="4" stroke-linecap="round"/>
    <!-- Left Plate (circle) -->
    <circle cx="-15" cy="5" r="5" fill="#121212"/>
    <!-- Right Plate (circle) -->
    <circle cx="15" cy="5" r="5" fill="#121212"/>
  </g>

  <!-- Right Text (analogous to "FC Amigos" in the mockup, but displaying "edq" in modern lowercase style) -->
  <text x="85" y="48" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="38" fill="#FFFFFF" alignment-baseline="middle">
    edq<tspan fill="url(#navGradient)">.</tspan>
  </text>
</svg>
